name: Fork Sync

permissions:
  contents: write  # 赋予写入仓库更新的权限

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 0点自动执行
  workflow_dispatch:     # 支持手动运行

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 极其重要！必须拉取完整的提交历史才能顺利跟上游进行 Diff 合并
          fetch-depth: 0 

      - name: Add Upstream and Sync
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 添加上游源
          git remote add upstream https://github.com/mtvpls/MoonTVPlus.git
          git fetch upstream
          
          # 切换并尝试快速追加或安全合并上游主分支
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync with upstream"
          
          # 推送到你自己的 Fork 仓库
          git push origin main
