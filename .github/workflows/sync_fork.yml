name: Fork Sync

permissions:
  contents: write  # 必须开启写入权限，否则 Action 无法将更新推送到你的仓库

on:
  schedule:
    - cron: "0 0 * * *"  # 每天午夜执行 (UTC时间，北京时间是早上8点)
  workflow_dispatch:  # 允许在 GitHub Actions 页面手动点击触发

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}  # 确保只有在 fork 的仓库中才运行

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          # ⬇️ 只需要修改下面这三行 ⬇️
          upstream_sync_repo: mtvpls/MoonTVPlus  # 例如：torvalds/linux
          upstream_sync_branch: main                        # 上游仓库的分支名（注意确认是 main 还是 master）
          target_sync_branch: main                          # 你自己仓库的目标分支名（通常也是 main 还是 master）
          # ⬆️ 只需要修改上面这三行 ⬆️
          test_mode: false

      - name: Check for new commits
        if: success()
        run: echo "Sync completed successfully"

      - name: Check for Failure
        if: failure()
        run: |
          echo "[Error] Sync failed. This might be due to:"
          echo "1. Changes in the upstream workflow file"
          echo "2. Merge conflicts that need manual resolution"
          echo "3. Network issues"
          echo "Please check the logs and consider manual sync if needed."
          exit 1
